server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Cross-Origin-Opener-Policy "same-origin" always;
  add_header Cross-Origin-Resource-Policy "same-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; upgrade-insecure-requests" always;

  location = /health {
    default_type text/plain;
    return 200 "ok\n";
  }

  location = / {
    add_header Cache-Control "no-cache" always;
    try_files /index.html =404;
  }

  location = /index.html {
    add_header Cache-Control "no-cache" always;
  }

  location ~* \.(css|js)$ {
    add_header Cache-Control "public, max-age=3600" always;
  }

  location / {
    try_files $uri $uri/ =404;
  }
}
