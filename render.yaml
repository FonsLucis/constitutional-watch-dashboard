services:
  - type: web
    name: constitutional-watch-dashboard
    runtime: docker
    plan: starter
    region: singapore
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PORT
        value: "10000"
      - key: HOST
        value: "0.0.0.0"
      - key: STORAGE_DIR
        value: /app/storage
      - key: NODE_ENV
        value: production
      - key: WEBAUTHN_RP_NAME
        value: RightOfResist
      - key: WEBAUTHN_RP_ID
        value: rightofresist.com
      - key: WEBAUTHN_ORIGINS
        value: https://rightofresist.com,https://www.rightofresist.com,https://constitutional-watch-dashboard-starter.onrender.com
      - key: SESSION_TTL_HOURS
        value: "168"
      - key: AUTH_CHALLENGE_TTL_MINUTES
        value: "10"
    disk:
      name: citizen-data
      mountPath: /app/storage
      sizeGB: 5
